// ─────────────────────────────────────────────
// SVG AVATAR — generato da descrizione fisica
// ─────────────────────────────────────────────
function AvatarSVG({ char, size = 80 }) {
  const s = size;
  const cx = s / 2;
  // Skin tones
  const skins = { light: "#fde3c0", medium: "#f0b27a", olive: "#c68642", dark: "#a0522d" };
  // Eye colors
  const eyes = { dark: "#2c1810", brown: "#6b3a2a", light: "#7fb3d3", hazel: "#8b6914" };
  // Hair colors
  const hairs = {
    red: "#c0392b",
    auburn: "#8B2500",
    "brown-light": "#9b6a2f",
    "brown-dark": "#5c3317",
    black: "#1a1a1a",
    "black-red": "#3a1010",
    blonde: "#e8c44a",
  };

  const sk = skins[char.skin] || skins.light;
  const ey = eyes[char.eyeColor] || eyes.dark;
  const hr = hairs[char.hairColor] || hairs.black;
  const gl = char.glasses;

  // Hair path helpers
  function hairLong() {
    // Long flowing hair
    return <>
      {/* back layer */}
      <ellipse cx={cx} cy={s*0.38} rx={s*0.29} ry={s*0.32} fill={hr} />
      {/* side falls */}
      <path d={`M${cx-s*0.28},${s*0.38} Q${cx-s*0.36},${s*0.7} ${cx-s*0.26},${s*0.85}`} stroke={hr} strokeWidth={s*0.1} fill="none" strokeLinecap="round"/>
      <path d={`M${cx+s*0.28},${s*0.38} Q${cx+s*0.36},${s*0.7} ${cx+s*0.26},${s*0.85}`} stroke={hr} strokeWidth={s*0.1} fill="none" strokeLinecap="round"/>
    </>;
  }
  function hairShortCurly() {
    return <>
      <ellipse cx={cx} cy={s*0.33} rx={s*0.27} ry={s*0.2} fill={hr} />
      {/* curly bumps */}
      <circle cx={cx-s*0.22} cy={s*0.32} r={s*0.08} fill={hr} />
      <circle cx={cx+s*0.22} cy={s*0.32} r={s*0.08} fill={hr} />
      <circle cx={cx-s*0.14} cy={s*0.25} r={s*0.07} fill={hr} />
      <circle cx={cx+s*0.14} cy={s*0.25} r={s*0.07} fill={hr} />
      <circle cx={cx} cy={s*0.23} r={s*0.07} fill={hr} />
    </>;
  }
  function hairVeryCurly() {
    return <>
      <ellipse cx={cx} cy={s*0.32} rx={s*0.3} ry={s*0.22} fill={hr} />
      {[...Array(8)].map((_, i) => {
        const angle = (i / 8) * Math.PI * 2;
        const rx2 = s * 0.27, ry2 = s * 0.19;
        const bx = cx + rx2 * Math.cos(angle);
        const by = s*0.32 + ry2 * Math.sin(angle);
        return <circle key={i} cx={bx} cy={by} r={s*0.065} fill={hr} />;
      })}
    </>;
  }
  function hairWavy() {
    return <>
      <ellipse cx={cx} cy={s*0.36} rx={s*0.28} ry={s*0.26} fill={hr} />
      <path d={`M${cx-s*0.26},${s*0.42} Q${cx-s*0.32},${s*0.58} ${cx-s*0.24},${s*0.7} Q${cx-s*0.16},${s*0.82} ${cx-s*0.22},${s*0.88}`}
        stroke={hr} strokeWidth={s*0.09} fill="none" strokeLinecap="round"/>
      <path d={`M${cx+s*0.26},${s*0.42} Q${cx+s*0.32},${s*0.58} ${cx+s*0.24},${s*0.7} Q${cx+s*0.16},${s*0.82} ${cx+s*0.22},${s*0.88}`}
        stroke={hr} strokeWidth={s*0.09} fill="none" strokeLinecap="round"/>
    </>;
  }
  function hairShort() {
    return <>
      <ellipse cx={cx} cy={s*0.35} rx={s*0.26} ry={s*0.18} fill={hr} />
      <rect x={cx-s*0.26} y={s*0.3} width={s*0.52} height={s*0.1} rx={s*0.05} fill={hr} />
    </>;
  }
  function hairMediumStraight() {
    return <>
      <ellipse cx={cx} cy={s*0.36} rx={s*0.28} ry={s*0.25} fill={hr} />
      <rect x={cx-s*0.27} y={s*0.42} width={s*0.1} height={s*0.28} rx={s*0.04} fill={hr} />
      <rect x={cx+s*0.17} y={s*0.42} width={s*0.1} height={s*0.28} rx={s*0.04} fill={hr} />
    </>;
  }

  const hairMap = {
    long: hairLong,
    "curly-short": hairShortCurly,
    "very-curly": hairVeryCurly,
    wavy: hairWavy,
    short: hairShort,
    "medium-straight": hairMediumStraight,
  };

  const renderHair = hairMap[char.hairStyle] || hairShort;

  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{ display: "block" }}>
      {/* background circle */}
      <circle cx={cx} cy={cx} r={cx} fill={char.bg} />

      {/* hair (back) */}
      {renderHair()}

      {/* neck */}
      <rect x={cx - s*0.07} y={s*0.68} width={s*0.14} height={s*0.14} rx={s*0.03} fill={sk} />

      {/* face */}
      <ellipse cx={cx} cy={s*0.5} rx={s*0.22} ry={s*0.26} fill={sk} />

      {/* ears */}
      <ellipse cx={cx - s*0.22} cy={s*0.52} rx={s*0.04} ry={s*0.06} fill={sk} />
      <ellipse cx={cx + s*0.22} cy={s*0.52} rx={s*0.04} ry={s*0.06} fill={sk} />

      {/* eyes */}
      <ellipse cx={cx - s*0.09} cy={s*0.48} rx={s*0.055} ry={s*0.045} fill="white" />
      <ellipse cx={cx + s*0.09} cy={s*0.48} rx={s*0.055} ry={s*0.045} fill="white" />
      <circle cx={cx - s*0.09} cy={s*0.48} r={s*0.028} fill={ey} />
      <circle cx={cx + s*0.09} cy={s*0.48} r={s*0.028} fill={ey} />
      {/* pupil shine */}
      <circle cx={cx - s*0.082} cy={s*0.474} r={s*0.008} fill="white" />
      <circle cx={cx + s*0.098} cy={s*0.474} r={s*0.008} fill="white" />
      {/* eyebrows */}
      <path d={`M${cx-s*0.14},${s*0.42} Q${cx-s*0.09},${s*0.40} ${cx-s*0.04},${s*0.42}`} stroke={hr} strokeWidth={s*0.018} fill="none" strokeLinecap="round"/>
      <path d={`M${cx+s*0.04},${s*0.42} Q${cx+s*0.09},${s*0.40} ${cx+s*0.14},${s*0.42}`} stroke={hr} strokeWidth={s*0.018} fill="none" strokeLinecap="round"/>

      {/* nose */}
      <circle cx={cx - s*0.045} cy={s*0.56} r={s*0.018} fill={sk} stroke="#c0905055" strokeWidth={1} />
      <circle cx={cx + s*0.045} cy={s*0.56} r={s*0.018} fill={sk} stroke="#c0905055" strokeWidth={1} />

      {/* mouth */}
      <path d={`M${cx-s*0.08},${s*0.63} Q${cx},${s*0.68} ${cx+s*0.08},${s*0.63}`} stroke="#c07060" strokeWidth={s*0.022} fill="none" strokeLinecap="round"/>

      {/* glasses */}
      {gl && <>
        <rect x={cx-s*0.2} y={s*0.455} width={s*0.16} height={s*0.1} rx={s*0.05} fill="none" stroke="#222" strokeWidth={s*0.025} />
        <rect x={cx+s*0.04} y={s*0.455} width={s*0.16} height={s*0.1} rx={s*0.05} fill="none" stroke="#222" strokeWidth={s*0.025} />
        <line x1={cx-s*0.04} y1={s*0.5} x2={cx+s*0.04} y2={s*0.5} stroke="#222" strokeWidth={s*0.02} />
        <line x1={cx-s*0.2} y1={s*0.505} x2={cx-s*0.26} y2={s*0.5} stroke="#222" strokeWidth={s*0.02} />
        <line x1={cx+s*0.2} y1={s*0.505} x2={cx+s*0.26} y2={s*0.5} stroke="#222" strokeWidth={s*0.02} />
      </>}

      {/* body/shoulders */}
      <path d={`M${cx-s*0.3},${s} Q${cx-s*0.22},${s*0.82} ${cx},${s*0.8} Q${cx+s*0.22},${s*0.82} ${cx+s*0.3},${s}`} fill={char.color} />

      {/* rim glow */}
      <circle cx={cx} cy={cx} r={cx-1} fill="none" stroke={char.color} strokeWidth="2" opacity="0.5" />
    </svg>
  );
}

// ─────────────────────────────────────────────
// ARBITRI — catena di validazione
// Ogni arbitro valida i punti dell'arbitrato (arbitro : arbitrato).
// Fase 2 = Pietro (p10) e Virginia (p5) sono partiti → Gaia arbitra Federica.
// ─────────────────────────────────────────────
const REFEREE_FULL = {
  p3:"p7",   // Federica → Simone
  p7:"p12",  // Simone   → Lorenzo
  p12:"p9",  // Lorenzo  → Daniele
  p9:"p1",   // Daniele  → Elisa
  p1:"p8",   // Elisa    → Gianluca
  p8:"p6",   // Gianluca → Marzia
  p6:"p4",   // Marzia   → Arianna
  p4:"p11",  // Arianna  → Alessio
  p11:"p2",  // Alessio  → Gaia
  p2:"p10",  // Gaia     → Pietro
  p10:"p5",  // Pietro   → Virginia
  p5:"p3",   // Virginia → Federica
};
const REFEREE_REDUCED = {
  p3:"p7", p7:"p12", p12:"p9", p9:"p1", p1:"p8", p8:"p6",
  p6:"p4", p4:"p11", p11:"p2",
  p2:"p3",   // Gaia → Federica (Pietro e Virginia partiti)
};
const DEPARTED_IDS = ["p10","p5"]; // Pietro, Virginia

function refereeMap(phase2){ return phase2 ? REFEREE_REDUCED : REFEREE_FULL; }
// chi devi arbitrare tu (arbitro → arbitrato)
function subjectOf(refereeId, phase2){ return refereeMap(phase2)[refereeId] || null; }
// chi arbitra te (arbitrato → arbitro)
function judgeOf(playerId, phase2){
  const m = refereeMap(phase2);
  for (const arb in m) if (m[arb] === playerId) return arb;
  return null;
}

// STORAGE
// ─────────────────────────────────────────────
const STORE_KEY = "weekgame_v3";
const load = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } };
const save = d => localStorage.setItem(STORE_KEY, JSON.stringify(d));
function initStore() {
  const s = load();
  if (!s.players) s.players = {};
  if (!s.activities) s.activities = DEFAULT_ACTIVITIES;
  if (!s.logs) s.logs = {};
  if (typeof s.phase2 !== "boolean") s.phase2 = false;
  // migrazione: ogni voce deve avere id e status
  Object.keys(s.logs).forEach(pid => {
    s.logs[pid] = (s.logs[pid] || []).map(l => ({
      ...l,
      id: l.id || uid(),
      status: l.status || "approved", // voci preesistenti: già valide
    }));
  });
  save(s); return s;
}

function CharacterSelect({ onSelect, takenIds }) {
  const [hover, setHover] = useState(null);
  const [adminInput, setAdminInput] = useState("");

  function tryAdmin() {
    if (ADMIN_CODES.includes(adminInput.trim().toUpperCase())) onSelect(null, true);

  }

  return (
    <div style={{
      minHeight:"100vh",

        {CHARACTERS.map(c => {
          const taken = takenIds.includes(c.id);
          const hov = hover === c.id;
          return (
            <div key={c.id}
              onClick={() => !taken && onSelect(c, false)}
              onMouseEnter={() => setHover(c.id)}
              onMouseLeave={() => setHover(null)}
              style={{
                background: hov && !taken ? `${c.color}22` : "#ffffff08",
                border:`2px solid ${taken ? "#ffffff18" : hov ? c.color : "#ffffff1a"}`,
                borderRadius:18, padding:"20px 10px 16px", textAlign:"center",
                cursor: taken ? "not-allowed" : "pointer",
                opacity: taken ? 0.45 : 1,
                transform: hov && !taken ? "translateY(-5px)" : "none",
                boxShadow: hov && !taken ? `0 10px 28px ${c.color}44` : "none",
                transition:"all 0.2s", position:"relative",
              }}
            >
              {taken && (
                <div style={{ position:"absolute", top:8, right:8, background:"#ffffff22", borderRadius:20, fontSize:10, padding:"2px 7px", color:"#fff", fontWeight:800 }}>IN USO</div>
              )}
              <div style={{ borderRadius:"50%", overflow:"hidden", width:80, height:80, margin:"0 auto 10px", boxShadow:`0 0 18px ${c.color}55` }}>
                <AvatarSVG char={c} size={80} />
              </div>
              <div style={{ color:"#fff", fontWeight:800, fontSize:15 }}>{c.name}</div>
            </div>
          );
        })}
      </div>

      {/* ADMIN */}
      <div style={{ background:"#ffffff0a", border:"1px solid #ffffff1a", borderRadius:18, padding:"20px 28px", width:"100%", maxWidth:360, textAlign:"center" }}>
        <p style={{ color:"#ffffff55", fontSize:13, marginBottom:12 }}>🔐 Accesso Admin</p>
        <div style={{ display:"flex", gap:8 }}>
          <input value={adminInput} onChange={e => setAdminInput(e.target.value)}
            onKeyDown={e => e.key==="Enter" && tryAdmin()}
            placeholder="Codice admin..."
            style={{ flex:1, padding:"10px 14px", borderRadius:10, border:"1px solid #ffffff2a", background:"#ffffff0f", color:"#fff", fontSize:14, outline:"none", fontFamily:"Nunito,sans-serif" }}

          <button onClick={tryAdmin} style={{ padding:"10px 18px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#6c63ff,#3a3a9f)", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:14, fontFamily:"Nunito,sans-serif" }}>Entra</button>

}

function Dashboard({ player, store, onSave, onLogout, isAdmin }) {
  const [tab, setTab] = useState("log");
  const [selectedId, setSelectedId] = useState(player?.id);

  const phase2 = !!store.phase2;
  const char = CHARACTERS.find(c => c.id === (isAdmin ? selectedId : player?.id));
  const logs = store.logs[selectedId] || [];
  const today = new Date().toISOString().split("T")[0];
  const isApproved = l => l.status === "approved";
  const todayLogs = logs.filter(l => l.date === today);
  const totalPoints = logs.filter(isApproved).reduce((s,l) => s + l.points, 0);
  const pendingPoints = logs.filter(l => !isApproved(l)).reduce((s,l) => s + l.points, 0);
  const todayPoints = todayLogs.filter(isApproved).reduce((s,l) => s + l.points, 0);

  // l'admin inserisce già approvato; il partecipante inserisce "in approvazione"
  function addActivity(act) {
    const ns = { ...store };
    if (!ns.logs[selectedId]) ns.logs[selectedId] = [];
    ns.logs[selectedId] = [...ns.logs[selectedId], {
      id: uid(), activityId:act.id, date:today, points:act.points, icon:act.icon, name:act.name,
      status: isAdmin ? "approved" : "pending",
    }];
    onSave(ns);
  }

  function removeLog(logId) {
    const ns = { ...store };
    ns.logs[selectedId] = (ns.logs[selectedId] || []).filter(l => l.id !== logId);
    onSave(ns);
  }

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f0c29,#1a1a3e)", color:"#fff" }}>
      {/* HEADER */}
      <div style={{ background:"#ffffff08", backdropFilter:"blur(12px)", borderBottom:"1px solid #ffffff12", padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          {isAdmin
            ? <span style={{ fontSize:28 }}>🔐</span>
            : char && <div style={{ borderRadius:"50%", overflow:"hidden", width:42, height:42, flexShrink:0, boxShadow:`0 0 12px ${char.color}66` }}><AvatarSVG char={char} size={42} /></div>
          }
          <div>
            <div style={{ fontWeight:800, fontSize:16 }}>{isAdmin ? "Admin Panel" : char?.name}</div>
            {!isAdmin && <div style={{ color:"#ffffff55", fontSize:12 }}>{totalPoints >= 0 ? "+" : ""}{totalPoints} pt {pendingPoints !== 0 && <span style={{ color:"#f39c12", fontWeight:700 }}>({pendingPoints>=0?"+":""}{pendingPoints} in attesa)</span>}</div>}
          </div>
        </div>
        <button onClick={onLogout} style={{ background:"#ffffff12", border:"1px solid #ffffff20", borderRadius:10, color:"#fff", padding:"8px 16px", cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:"Nunito,sans-serif" }}>Esci</button>
      </div>

      {/* TABS */}
      <div style={{ display:"flex", borderBottom:"1px solid #ffffff12" }}>
        {[["log","📋 Attività",true],["approve","⏳ In approvazione",true],["rank","🏆 Classifica",true],["admin","⚙️ Admin",isAdmin]].filter(t=>t[2]).map(([id,label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ flex:1, padding:"14px 8px", border:"none", background:tab===id?"#ffffff12":"transparent", color:tab===id?"#fff":"#ffffff44", fontWeight:tab===id?800:600, cursor:"pointer", fontSize:14, fontFamily:"Nunito,sans-serif", borderBottom:tab===id?"2px solid #6c63ff":"2px solid transparent", transition:"all 0.2s" }}>{label}</button>
        ))}
      </div>

      <div style={{ padding:"20px 16px", maxWidth:680, margin:"0 auto" }}>

        {/* LOG */}
        {tab==="log" && (
          <div>
            {isAdmin && (
              <div style={{ marginBottom:20 }}>
                <p style={{ color:"#ffffff55", fontSize:13, marginBottom:10 }}>Profilo selezionato:</p>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {CHARACTERS.filter(c => store.players[c.id]).map(c => (
                    <button key={c.id} onClick={() => setSelectedId(c.id)} style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 14px", borderRadius:20, border:`2px solid ${selectedId===c.id?c.color:"#ffffff22"}`, background:selectedId===c.id?`${c.color}22`:"transparent", color:"#fff", cursor:"pointer", fontWeight:700, fontSize:13, fontFamily:"Nunito,sans-serif" }}>
                      <div style={{ borderRadius:"50%", overflow:"hidden", width:24, height:24 }}><AvatarSVG char={c} size={24} /></div>
                      {c.name}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {char && <>
              <h2 style={{ fontSize:17, fontWeight:800, marginBottom:4 }}>
                {new Date().toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}
              </h2>
              <p style={{ color:"#ffffff44", fontSize:13, marginBottom:20 }}>
                Oggi: <span style={{ color:todayPoints>=0?"#2ecc71":"#e74c3c", fontWeight:800 }}>{todayPoints>=0?"+":""}{todayPoints}</span> pt
              </p>

              {todayLogs.length > 0 && (
                <div style={{ marginBottom:24 }}>
                  <p style={{ color:"#ffffff66", fontSize:13, fontWeight:700, marginBottom:10 }}>📋 Registrate oggi:</p>
                  {todayLogs.map(l => (
                    <div key={l.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#ffffff09", borderRadius:12, padding:"11px 15px", marginBottom:8, border:`1px solid ${l.points>=0?"#2ecc7133":"#e74c3c33"}`, opacity:isApproved(l)?1:0.75 }}>
                      <span style={{ fontSize:15 }}>
                        {l.icon} {l.name}
                        {l.byRef && <span style={{ marginLeft:8, fontSize:11, fontWeight:800, color:"#9b6bff", background:"#9b6bff20", borderRadius:8, padding:"2px 7px" }}>🧑‍⚖️ arbitro</span>}
                        {l.status==="approved"      && <span style={{ marginLeft:8, fontSize:11, fontWeight:800, color:"#2ecc71", background:"#2ecc7120", borderRadius:8, padding:"2px 7px" }}>✅ ok</span>}
                        {l.status==="pending"       && <span style={{ marginLeft:8, fontSize:11, fontWeight:800, color:"#f39c12", background:"#f39c1220", borderRadius:8, padding:"2px 7px" }}>⏳ in attesa</span>}
                        {l.status==="await_subject" && <span style={{ marginLeft:8, fontSize:11, fontWeight:800, color:"#9b6bff", background:"#9b6bff20", borderRadius:8, padding:"2px 7px" }}>⚖️ da accettare</span>}
                        {l.status==="disputed"      && <span style={{ marginLeft:8, fontSize:11, fontWeight:800, color:"#e74c3c", background:"#e74c3c20", borderRadius:8, padding:"2px 7px" }}>⛔ contestato</span>}
                      </span>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <span style={{ color:l.points>=0?"#2ecc71":"#e74c3c", fontWeight:800, fontSize:16 }}>{l.points>=0?"+":""}{l.points}</span>
                        {(isAdmin || (l.status==="pending" && !l.byRef)) && (
                          <button onClick={() => removeLog(l.id)} title="Rimuovi" style={{ background:"#ffffff12", border:"none", borderRadius:6, color:"#ffffff77", cursor:"pointer", padding:"4px 9px", fontSize:12, fontFamily:"Nunito,sans-serif" }}>✕</button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <p style={{ color:"#ffffff66", fontSize:13, fontWeight:700, marginBottom:12 }}>➕ Aggiungi attività:</p>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {store.activities.map(act => (
                  <button key={act.id} onClick={() => addActivity(act)} style={{ display:"flex", alignItems:"center", gap:10, background:act.points>=0?"#2ecc7112":"#e74c3c12", border:`1px solid ${act.points>=0?"#2ecc7130":"#e74c3c30"}`, borderRadius:14, padding:"13px 15px", cursor:"pointer", color:"#fff", fontWeight:700, fontSize:14, textAlign:"left", fontFamily:"Nunito,sans-serif", transition:"all 0.15s" }}>
                    <span style={{ fontSize:22 }}>{act.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, lineHeight:1.3 }}>{act.name}</div>
                      <div style={{ color:act.points>=0?"#2ecc71":"#e74c3c", fontSize:13, fontWeight:900 }}>{act.points>=0?"+":""}{act.points} pt</div>
                    </div>
                  </button>
                ))}
              </div>
            </>}
          </div>
        )}

        {/* IN APPROVAZIONE */}
        {tab==="approve" && <ApprovalScreen store={store} onSave={onSave} isAdmin={isAdmin} myId={player?.id} phase2={phase2} />}

        {/* CLASSIFICA */}
        {tab==="rank" && <Leaderboard store={store} currentId={player?.id} />}

        {/* ADMIN */}
        {tab==="admin" && isAdmin && <AdminPanel store={store} onSave={onSave} />}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// IN APPROVAZIONE (arbitri)
// ─────────────────────────────────────────────
const STATUS_TAG = {
  pending:       { t:"⏳ in attesa arbitro", c:"#f39c12" },
  await_subject: { t:"⚖️ da accettare",      c:"#9b6bff" },
  disputed:      { t:"⛔ contestato",         c:"#e74c3c" },
};

function PendingRow({ log, onApprove, onReject, aTitle, rTitle, tag }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#ffffff09", borderRadius:12, padding:"11px 14px", marginBottom:8, border:`1px solid ${log.points>=0?"#2ecc7133":"#e74c3c33"}` }}>
      <span style={{ fontSize:15, flex:1 }}>{log.icon} {log.name}{tag && <span style={{ marginLeft:8, fontSize:11, fontWeight:800, color:tag.c, background:tag.c+"20", borderRadius:8, padding:"2px 7px" }}>{tag.t}</span>}</span>
      <span style={{ color:log.points>=0?"#2ecc71":"#e74c3c", fontWeight:800, fontSize:16, marginRight:12, minWidth:42, textAlign:"right" }}>{log.points>=0?"+":""}{log.points}</span>
      <div style={{ display:"flex", gap:6 }}>
        <button onClick={onApprove} title={aTitle||"Approva"} style={{ background:"#2ecc7122", border:"1px solid #2ecc7155", borderRadius:8, color:"#2ecc71", cursor:"pointer", padding:"6px 10px", fontWeight:800, fontFamily:"Nunito,sans-serif" }}>✓</button>
        <button onClick={onReject} title={rTitle||"Rifiuta"} style={{ background:"#e74c3c22", border:"1px solid #e74c3c55", borderRadius:8, color:"#e74c3c", cursor:"pointer", padding:"6px 10px", fontWeight:800, fontFamily:"Nunito,sans-serif" }}>✕</button>
      </div>
    </div>
  );
}

function InfoRow({ log, note }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#ffffff08", borderRadius:12, padding:"11px 14px", marginBottom:8, border:"1px solid #ffffff14" }}>
      <span style={{ fontSize:15 }}>{log.icon} {log.name}{note && <span style={{ marginLeft:8, color:"#ffffff55", fontSize:12 }}>{note}</span>}</span>
      <span style={{ color:log.points>=0?"#2ecc71":"#e74c3c", fontWeight:800, fontSize:16 }}>{log.points>=0?"+":""}{log.points}</span>
    </div>
  );
}

function ApprovalScreen({ store, onSave, isAdmin, myId, phase2 }) {
  const today = new Date().toISOString().split("T")[0];
  const logsOf = pid => store.logs[pid] || [];
  const byStatus = (pid, st) => logsOf(pid).filter(l => l.status === st);
  const nonApprovedOf = pid => logsOf(pid).filter(l => l.status !== "approved");
  const malusActs = store.activities.filter(a => a.points < 0);

  function setStatus(pid, logId, status) {
    const ns = { ...store };
    ns.logs[pid] = logsOf(pid).map(l => l.id === logId ? { ...l, status } : l);
    onSave(ns);
  }
  function removeLog(pid, logId) {
    const ns = { ...store };
    ns.logs[pid] = logsOf(pid).filter(l => l.id !== logId);
    onSave(ns);
  }
  function approveAllSelf(pid) {
    const ns = { ...store };
    ns.logs[pid] = logsOf(pid).map(l => l.status === "pending" ? { ...l, status:"approved" } : l);
    onSave(ns);
  }
  function proposeMalus(pid, act) {
    const ns = { ...store };
    if (!ns.logs[pid]) ns.logs[pid] = [];
    ns.logs[pid] = [...logsOf(pid), {
      id: uid(), activityId:act.id, date:today, points:act.points, icon:act.icon, name:act.name,
      status:"await_subject", byRef:true,
    }];
    onSave(ns);
  }

  const h2 = { fontSize:22, fontWeight:900, marginBottom:4 };
  const h3 = { fontSize:15, fontWeight:800, color:"#ffffff88", margin:"22px 0 12px" };
  const empty = txt => <p style={{ color:"#ffffff33", fontSize:14, fontStyle:"italic", padding:"6px 0" }}>{txt}</p>;

  // ─── VISTA ADMIN: tutte le voci non approvate ───
  if (isAdmin) {
    const withPending = CHARACTERS.filter(c => nonApprovedOf(c.id).length > 0);
    return (
      <div>
        <h2 style={h2}>⏳ In approvazione</h2>
        <p style={{ color:"#ffffff44", fontSize:13, marginBottom:12 }}>Panoramica admin — puoi approvare o rifiutare qualsiasi voce. I malus <b style={{color:"#e74c3c"}}>contestati</b> aspettano la tua decisione.</p>
        {withPending.length === 0 && empty("Niente da gestire. Tutto validato! ✅")}
        {withPending.map(c => (
          <div key={c.id} style={{ marginBottom:24 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <div style={{ borderRadius:"50%", overflow:"hidden", width:32, height:32 }}><AvatarSVG char={c} size={32} /></div>
              <span style={{ fontWeight:800, fontSize:16 }}>{c.name}</span>
              <span style={{ color:"#ffffff44", fontSize:12 }}>arbitro: {CHARACTERS.find(x=>x.id===judgeOf(c.id, phase2))?.name || "—"}</span>
            </div>
            {nonApprovedOf(c.id).map(l => (
              <PendingRow key={l.id} log={l} tag={STATUS_TAG[l.status]}
                aTitle={l.status==="disputed" ? "Accetta al posto suo" : "Approva"}
                rTitle={l.status==="disputed" ? "Conferma rifiuto" : "Rifiuta"}
                onApprove={() => setStatus(c.id, l.id, "approved")}
                onReject={() => removeLog(c.id, l.id)} />
            ))}
          </div>
        ))}
      </div>
    );
  }

  // ─── VISTA PARTECIPANTE ───
  const subjectId = subjectOf(myId, phase2);
  const subject = CHARACTERS.find(c => c.id === subjectId);
  const subjectPending = subjectId ? byStatus(subjectId, "pending") : [];
  const myProposedToSubject = subjectId ? logsOf(subjectId).filter(l => l.byRef && l.status !== "approved") : [];
  const myJudge = CHARACTERS.find(c => c.id === judgeOf(myId, phase2));
  const malusToAccept = byStatus(myId, "await_subject");
  const myDisputed = byStatus(myId, "disputed");
  const mySelfPending = byStatus(myId, "pending");

  return (
    <div>
      <h2 style={h2}>⏳ In approvazione</h2>

      {/* Malus proposti a ME dal mio arbitro — priorità in alto */}
      {malusToAccept.length > 0 && <>
        <h3 style={{ ...h3, marginTop:14, color:"#9b6bff" }}>⚖️ Malus proposti dal tuo arbitro</h3>
        <p style={{ color:"#ffffff55", fontSize:12, marginBottom:12 }}>Accetta o rifiuta. Se rifiuti, la decisione passa agli admin.</p>
        {malusToAccept.map(l => (
          <PendingRow key={l.id} log={l} aTitle="Accetto" rTitle="Rifiuto"
            onApprove={() => setStatus(myId, l.id, "approved")}
            onReject={() => setStatus(myId, l.id, "disputed")} />
        ))}
      </>}
      {myDisputed.length > 0 && <>
        <h3 style={h3}>⛔ Malus che hai contestato</h3>
        {myDisputed.map(l => <InfoRow key={l.id} log={l} note="in attesa decisione admin" />)}
      </>}

      {/* Ruolo arbitro */}
      <div style={{ background:"#9b6bff14", border:"1px solid #9b6bff33", borderRadius:16, padding:"16px 18px", margin:"14px 0 6px", display:"flex", alignItems:"center", gap:14 }}>
        {subject ? (
          <>
            <div style={{ borderRadius:"50%", overflow:"hidden", width:48, height:48, flexShrink:0, boxShadow:`0 0 12px ${subject.color}55` }}><AvatarSVG char={subject} size={48} /></div>
            <div>
              <div style={{ color:"#ffffff88", fontSize:12, fontWeight:700 }}>🧑‍⚖️ Stai arbitrando</div>
              <div style={{ fontWeight:900, fontSize:20 }}>{subject.name}</div>
            </div>
          </>
        ) : (
          <div style={{ fontSize:15 }}>🎉 In questa fase non arbitri nessuno.</div>
        )}
      </div>

      {subject && <>
        <h3 style={h3}>Punti di {subject.name} da validare</h3>
        {subjectPending.length === 0
          ? empty(`Nessun punto in attesa da ${subject.name}.`)
          : <>
              <button onClick={() => approveAllSelf(subjectId)} style={{ marginBottom:12, background:"#2ecc7118", border:"1px solid #2ecc7144", borderRadius:10, color:"#2ecc71", cursor:"pointer", padding:"8px 16px", fontWeight:800, fontSize:13, fontFamily:"Nunito,sans-serif" }}>✓ Approva tutti</button>
              {subjectPending.map(l => (
                <PendingRow key={l.id} log={l} onApprove={() => setStatus(subjectId, l.id, "approved")} onReject={() => removeLog(subjectId, l.id)} />
              ))}
            </>
        }

        <h3 style={h3}>➕ Suggerisci un malus a {subject.name}</h3>
        <p style={{ color:"#ffffff44", fontSize:12, marginBottom:12 }}>Come arbitro puoi (e devi!) proporre malus. {subject.name} dovrà accettarli; se rifiuta, decidono gli admin.</p>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {malusActs.map(act => (
            <button key={act.id} onClick={() => proposeMalus(subjectId, act)} style={{ display:"flex", alignItems:"center", gap:10, background:"#e74c3c12", border:"1px solid #e74c3c30", borderRadius:14, padding:"13px 15px", cursor:"pointer", color:"#fff", fontWeight:700, fontSize:14, textAlign:"left", fontFamily:"Nunito,sans-serif" }}>
              <span style={{ fontSize:22 }}>{act.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, lineHeight:1.3 }}>{act.name}</div>
                <div style={{ color:"#e74c3c", fontSize:13, fontWeight:900 }}>{act.points} pt</div>
              </div>
            </button>
          ))}
        </div>

        {myProposedToSubject.length > 0 && <>
          <h3 style={h3}>Malus che hai proposto a {subject.name}</h3>
          {myProposedToSubject.map(l => (
            <InfoRow key={l.id} log={l} note={l.status==="await_subject" ? "in attesa che accetti" : "contestato · agli admin"} />
          ))}
        </>}
      </>}

      {/* I tuoi punti auto-registrati in attesa dell'arbitro */}
      <h3 style={h3}>I tuoi punti in attesa {myJudge && <span style={{ color:"#ffffff44", fontWeight:600, fontSize:12 }}>· arbitro: {myJudge.name}</span>}</h3>
      {mySelfPending.length === 0
        ? empty("Nessuno — sei in regola ✅")
        : mySelfPending.map(l => <InfoRow key={l.id} log={l} />)
      }
    </div>
  );
}

// ─────────────────────────────────────────────
// LEADERBOARD
// ─────────────────────────────────────────────
function Leaderboard({ store, currentId }) {
  const ranked = CHARACTERS
    .filter(c => store.players[c.id])
    .map(c => {
      const logs = (store.logs[c.id] || []).filter(l => l.status === "approved");
      const total = logs.reduce((s,l) => s+l.points, 0);
      const today = new Date().toISOString().split("T")[0];
      const todayPts = logs.filter(l => l.date===today).reduce((s,l) => s+l.points, 0);
      const pending = (store.logs[c.id] || []).filter(l => l.status !== "approved").length;
      return { ...c, total, todayPts, pending };
    })
    .sort((a,b) => b.total - a.total);

  const medals = ["🥇","🥈","🥉"];

  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:900, marginBottom:4 }}>🏆 Classifica</h2>
      <p style={{ color:"#ffffff44", fontSize:13, marginBottom:24 }}>Aggiornata: {new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})}</p>

      {ranked.length === 0 && (
        <div style={{ textAlign:"center", color:"#ffffff33", padding:40 }}>
          <div style={{ fontSize:48 }}>👥</div>
          <p style={{ marginTop:12 }}>Nessun giocatore ancora</p>
        </div>
      )}

      {ranked.map((c,i) => (
        <div key={c.id} style={{ display:"flex", alignItems:"center", gap:14, background:c.id===currentId?`${c.color}22`:"#ffffff08", border:`2px solid ${c.id===currentId?c.color:i===0?"#f1c40f44":"#ffffff12"}`, borderRadius:16, padding:"14px 18px", marginBottom:10, transform:i===0?"scale(1.02)":"none", boxShadow:i===0?"0 4px 20px #f1c40f22":"none" }}>
          <div style={{ fontSize:26, minWidth:32, textAlign:"center" }}>{medals[i]||`${i+1}.`}</div>
          <div style={{ borderRadius:"50%", overflow:"hidden", width:48, height:48, flexShrink:0, boxShadow:`0 0 12px ${c.color}55` }}><AvatarSVG char={c} size={48} /></div>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:800, fontSize:16 }}>{c.name} {c.id===currentId&&<span style={{ fontSize:12, color:c.color }}>(tu)</span>}</div>
            <div style={{ color:"#ffffff44", fontSize:12 }}>Oggi: <span style={{ color:c.todayPts>=0?"#2ecc71":"#e74c3c", fontWeight:700 }}>{c.todayPts>=0?"+":""}{c.todayPts}</span>{c.pending>0 && <span style={{ color:"#f39c12", fontWeight:700 }}> · ⏳ {c.pending} in attesa</span>}</div>
          </div>
          <div style={{ fontSize:22, fontWeight:900, color:c.total>=0?"#2ecc71":"#e74c3c" }}>{c.total>=0?"+":""}{c.total}</div>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────
// ADMIN PANEL
// ─────────────────────────────────────────────
function AdminPanel({ store, onSave }) {
  const [newAct, setNewAct] = useState({ name:"", points:"", icon:"⭐" });
  const [msg, setMsg] = useState("");

  const inp = { padding:"10px 14px", borderRadius:10, border:"1px solid #ffffff2a", background:"#ffffff0f", color:"#fff", fontSize:14, outline:"none", fontFamily:"Nunito,sans-serif" };

  function addActivity() {
    if (!newAct.name || !newAct.points) { alert("Compila nome e punti!"); return; }
    const ns = { ...store, activities: [...store.activities, { ...newAct, id:"a"+Date.now(), points:Number(newAct.points) }] };
    onSave(ns); setNewAct({ name:"", points:"", icon:"⭐" });
    setMsg("✅ Aggiunta!"); setTimeout(() => setMsg(""), 2000);
  }

  function removeActivity(id) { onSave({ ...store, activities: store.activities.filter(a => a.id!==id) }); }

  function resetAll() {
    if (!confirm("Sei sicuro? Tutti i punti verranno azzerati!")) return;
    onSave({ ...store, logs:{} });
  }

  function togglePhase2() {
    const next = !store.phase2;
    if (!confirm(next
      ? "Confermi che Pietro e Virginia sono partiti? La catena arbitri passa a 10 giocatori (Gaia arbitra Federica)."
      : "Ripristinare la catena completa a 12 giocatori (con Pietro e Virginia)?")) return;
    onSave({ ...store, phase2: next });
  }

  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:900, marginBottom:24 }}>⚙️ Admin</h2>

      <h3 style={{ fontSize:15, fontWeight:800, color:"#ffffff66", marginBottom:12 }}>👥 Giocatori registrati</h3>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:32 }}>
        {CHARACTERS.filter(c => store.players[c.id]).map(c => (
          <div key={c.id} style={{ display:"flex", alignItems:"center", gap:8, background:`${c.color}22`, border:`1px solid ${c.color}44`, borderRadius:20, padding:"7px 14px" }}>
            <div style={{ borderRadius:"50%", overflow:"hidden", width:24, height:24 }}><AvatarSVG char={c} size={24} /></div>
            <span style={{ color:"#fff", fontWeight:700, fontSize:14 }}>{c.name}</span>
          </div>
        ))}
        {CHARACTERS.filter(c=>store.players[c.id]).length===0 && <p style={{ color:"#ffffff33", fontSize:14 }}>Nessuno ancora</p>}
      </div>

      <h3 style={{ fontSize:15, fontWeight:800, color:"#ffffff66", marginBottom:12 }}>🧑‍⚖️ Fase arbitri</h3>
      <div style={{ background:"#ffffff08", border:"1px solid #ffffff1a", borderRadius:16, padding:"16px 18px", marginBottom:32 }}>
        <p style={{ fontSize:14, marginBottom:4 }}>Catena attuale: <b style={{ color:store.phase2?"#f39c12":"#2ecc71" }}>{store.phase2 ? "Ridotta (10 giocatori)" : "Completa (12 giocatori)"}</b></p>
        <p style={{ color:"#ffffff55", fontSize:12, marginBottom:14 }}>
          {store.phase2
            ? "Pietro e Virginia sono partiti. Gaia arbitra Federica."
            : "Tutti presenti. Gaia arbitra Pietro, Pietro arbitra Virginia, Virginia arbitra Federica."}
        </p>
        <button onClick={togglePhase2} style={{ padding:"11px 20px", borderRadius:12, border:"none", cursor:"pointer", fontWeight:800, fontSize:14, fontFamily:"Nunito,sans-serif", color:"#fff", background: store.phase2 ? "linear-gradient(135deg,#2ecc71,#27ae60)" : "linear-gradient(135deg,#e67e22,#d35400)" }}>
          {store.phase2 ? "↩️ Ripristina catena completa" : "✈️ Pietro e Virginia sono partiti"}
        </button>
      </div>

      <h3 style={{ fontSize:15, fontWeight:800, color:"#ffffff66", marginBottom:12 }}>➕ Nuova attività</h3>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:8 }}>
        <input value={newAct.icon} onChange={e=>setNewAct({...newAct,icon:e.target.value})} style={{ ...inp, width:52 }} maxLength={2} />
        <input value={newAct.name} onChange={e=>setNewAct({...newAct,name:e.target.value})} placeholder="Nome attività" style={{ ...inp, flex:1, minWidth:140 }} />
        <input value={newAct.points} onChange={e=>setNewAct({...newAct,points:e.target.value})} type="number" placeholder="Punti" style={{ ...inp, width:88 }} />
        <button onClick={addActivity} style={{ padding:"10px 18px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#2ecc71,#27ae60)", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"Nunito,sans-serif" }}>Aggiungi</button>
      </div>
      {msg && <p style={{ color:"#2ecc71", fontSize:13, marginBottom:8 }}>{msg}</p>}

      <h3 style={{ fontSize:15, fontWeight:800, color:"#ffffff66", margin:"24px 0 12px" }}>📋 Attività</h3>
      {store.activities.map(a => (
        <div key={a.id} style={{ display:"flex", alignItems:"center", gap:12, background:"#ffffff08", borderRadius:12, padding:"11px 14px", marginBottom:8 }}>
          <span style={{ fontSize:18 }}>{a.icon}</span>
          <span style={{ flex:1, fontSize:14 }}>{a.name}</span>
          <span style={{ color:a.points>=0?"#2ecc71":"#e74c3c", fontWeight:800 }}>{a.points>=0?"+":""}{a.points}</span>
          <button onClick={() => removeActivity(a.id)} style={{ background:"#e74c3c20", border:"1px solid #e74c3c44", borderRadius:8, color:"#e74c3c", cursor:"pointer", padding:"4px 10px", fontFamily:"Nunito,sans-serif" }}>✕</button>
        </div>
      ))}

      <button onClick={resetAll} style={{ marginTop:28, padding:"12px 24px", borderRadius:12, border:"1px solid #e74c3c55", background:"#e74c3c18", color:"#e74c3c", fontWeight:800, cursor:"pointer", fontSize:14, fontFamily:"Nunito,sans-serif" }}>⚠️ Azzera tutti i punti</button>
    </div>
  );
}

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
function App() {
  const [store, setStore] = useState(() => initStore());
  const [currentPlayer, setCurrentPlayer] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);

  useEffect(() => {
    const iv = setInterval(() => setStore(load()), 8000);
    return () => clearInterval(iv);
  }, []);

  function saveStore(ns) { save(ns); setStore(ns); }

  function handleSelect(char, admin) {
    if (admin) { setIsAdmin(true); setCurrentPlayer(null); return; }
    const ns = { ...store };
    ns.players[char.id] = { joinedAt: new Date().toISOString() };
    saveStore(ns);
    setCurrentPlayer(char); setIsAdmin(false);
  }

  function handleLogout() { setCurrentPlayer(null); setIsAdmin(false); }

  const takenIds = Object.keys(store.players);

  if (!currentPlayer && !isAdmin) return <CharacterSelect onSelect={handleSelect} takenIds={takenIds} />;

  return <Dashboard player={currentPlayer} store={store} onSave={saveStore} onLogout={handleLogout} isAdmin={isAdmin} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
